worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # Docker's internal DNS resolver
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # ============================================
    # CORS CONFIG (Tập trung — dùng chung cho tất cả services)
    # ============================================

    # Các header CORS được include trong mỗi location
    # Sử dụng: include /etc/nginx/cors.conf; (xem bên dưới)

    # -------------------------------
    # SERVER BLOCK
    # -------------------------------
    server {
        listen 80;
        server_name localhost;

        # ============================================
        # CORS — Xử lý preflight OPTIONS tập trung
        # Tất cả /api/ requests đều qua đây trước
        # ============================================

        # Preflight OPTIONS cho toàn bộ /api/
        if ($request_method = 'OPTIONS') {
            set $cors_preflight "yes";
        }

        # -------------------------------
        # ROUTES
        # -------------------------------

        # 1. AUTH SERVICE
        location /api/v1/auth/ {
            # CORS
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, X-App-Id, X-API-Key, Content-Type, Accept' always;
            add_header 'Access-Control-Max-Age' 86400 always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, X-App-Id, X-API-Key, Content-Type, Accept' always;
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            set $upstream_auth auth-services:3000;
            rewrite ^/api/v1/auth/(.*)$ /$1 break;
            proxy_pass http://$upstream_auth;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header x-app-id $http_x_app_id;
            proxy_set_header x-api-key $http_x_api_key;
        }

        # 2. APP SERVICE (Owner console)
        location /api/v1/apps/ {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, X-App-Id, X-API-Key, Content-Type, Accept' always;
            add_header 'Access-Control-Max-Age' 86400 always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, X-App-Id, X-API-Key, Content-Type, Accept' always;
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            set $upstream_app app-services:3001;
            rewrite ^/api/v1/apps/(.*)$ /$1 break;
            proxy_pass http://$upstream_app;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        # 3. WATERDB SERVICE (Firestore Clone)
        location /api/v1/waterdb/ {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, X-App-Id, X-API-Key, Content-Type, Accept' always;
            add_header 'Access-Control-Max-Age' 86400 always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, X-App-Id, X-API-Key, Content-Type, Accept' always;
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            set $upstream_waterdb waterdb-services:3002;
            rewrite ^/api/v1/waterdb/(.*)$ /$1 break;
            proxy_pass http://$upstream_waterdb;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-App-Id $http_x_app_id;
            proxy_set_header Authorization $http_authorization;
        }

        # 4. SOCKET.IO / REALTIME WEBSOCKET
        location /socket.io/ {
            set $upstream_rtwaterdb rtwaterdb-services:3005;
            proxy_pass http://$upstream_rtwaterdb;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_buffering off;
        }

        # 5. RTWATERDB SERVICE (Realtime DB / Socket.io)
        location /api/v1/rtwaterdb/ {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, X-App-Id, X-API-Key, Content-Type, Accept' always;
            add_header 'Access-Control-Max-Age' 86400 always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, X-App-Id, X-API-Key, Content-Type, Accept' always;
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            set $upstream_rtwaterdb rtwaterdb-services:3005;
            rewrite ^/api/v1/rtwaterdb/(.*)$ /$1 break;
            proxy_pass http://$upstream_rtwaterdb;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header x-app-id $http_x_app_id;
            proxy_set_header x-api-key $http_x_api_key;
            proxy_read_timeout 86400;
        }

        # 6. RULE SERVICE
        location /api/v1/rules/ {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, X-App-Id, X-API-Key, Content-Type, Accept' always;
            add_header 'Access-Control-Max-Age' 86400 always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, X-App-Id, X-API-Key, Content-Type, Accept' always;
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            set $upstream_rule rule-services:3004;
            rewrite ^/api/v1/rules/(.*)$ /$1 break;
            proxy_pass http://$upstream_rule;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-App-Id $http_x_app_id;
            proxy_set_header x-app-id $http_x_app_id;
            proxy_set_header x-api-key $http_x_api_key;
        }

        # 7. STORAGE SERVICE
        location /api/v1/storage/ {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, X-App-Id, X-API-Key, Content-Type, Accept' always;
            add_header 'Access-Control-Max-Age' 86400 always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, X-App-Id, X-API-Key, Content-Type, Accept' always;
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            set $upstream_storage storage-services:3003;
            rewrite ^/api/v1/storage/(.*)$ /$1 break;
            proxy_pass http://$upstream_storage;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-App-Id $http_x_app_id;
            client_max_body_size 20M;
        }

        # 8. ANALYTICS SERVICE
        location /api/v1/analytics/ {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, X-App-Id, X-API-Key, Content-Type, Accept' always;
            add_header 'Access-Control-Max-Age' 86400 always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, X-App-Id, X-API-Key, Content-Type, Accept' always;
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            set $upstream_analytics analytics-services:3006;
            rewrite ^/api/v1/analytics/(.*)$ /analytics/$1 break;
            proxy_pass http://$upstream_analytics;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header x-app-id $http_x_app_id;
            proxy_set_header x-api-key $http_x_api_key;
        }

        # 9. RAG AI SERVICE
        location /api/v1/ai/ {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, X-App-Id, X-API-Key, Content-Type, Accept' always;
            add_header 'Access-Control-Max-Age' 86400 always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, X-App-Id, X-API-Key, Content-Type, Accept' always;
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            set $upstream_rag rag-ai-services:3007;
            rewrite ^/api/v1/ai/(.*)$ /api/$1 break;
            proxy_pass http://$upstream_rag;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;

            # Timeout dài hơn cho AI generation
            proxy_read_timeout 120;
            proxy_connect_timeout 10;
        }

        # RAG AI — Health check (không cần CORS)
        location = /api/v1/ai/health {
            set $upstream_rag rag-ai-services:3007;
            proxy_pass http://$upstream_rag/health;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            return 404;
        }
    }
}